<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} &mdash; {% endif %}{{ site.title }}</title>
<meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<link rel="icon" type="image/svg+xml" href="{{ "/favicon.svg" | relative_url }}">
<link rel="alternate icon" href="{{ "/favicon.ico" | relative_url }}">
<link rel="icon" type="image/png" sizes="64x64" href="{{ "/favicon.png" | relative_url }}">
<link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
